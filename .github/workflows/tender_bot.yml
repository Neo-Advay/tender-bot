name: Tender Bot
permissions:
    contents: write
on:
  schedule:
    - cron: '0 9 * * *'         # at 9:00 AM every day
  workflow_dispatch:          # Also allows manual trigger from GitHub UI

jobs:
  run-tender-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize DB if not exists
        run: python initialize_setup.py

      - name: Run Tender Bot
        env:
          SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME:   ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:       ${{ secrets.SMTP_FROM }}
          SMTP_RECIPIENTS: ${{ secrets.SMTP_RECIPIENTS }}
        run: python main.py

      - name: Commit updated DB back to repo
        run: |
          git config user.name "Tender Bot"
          git config user.email "bot@neospace-grp.de"
          git add data/tenders.db
          git diff --staged --quiet && exit 0
          git commit -m "chore: update tenders DB [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done
            
        