# config.yaml
app:
  name: "Tender Monitoring Bot"
  log_level: "INFO"

database:
  path: "data/tenders.db"

# This is where you will add more keywords later!
relevance:
  keywords_strong:
    - "messebau"
    - "standbau"
    - "messestand"
    - "eventarchitektur"
  keywords_secondary:
    - "montage"
    - "logistik"
    - "temporäre bauten"
  cpv_codes:
    - "79950000" # Exhibition/event services
    - "45212320" # Construction of exhibition buildings

# How important is each factor? (Total should be 1.0)
weights:
  keyword_score: 0.5
  cpv_score: 0.5

notifications:
  email:
    enabled: true
    smtp_host: "smtp.office365.com"
    smtp_port: 587
    use_starttls: true
    username_env: "OUTLOOK_SMTP_USERNAME"
    password_env: "OUTLOOK_SMTP_PASSWORD"
    from_address: "a.deshpande@neospace.group"
    to_addresses:
      - "a.deshpande@neospace.group"
    mode: "digest"   # "digest" or "immediate"
    max_items: 50

smtp:
  host: relay.neospace-grp.de
  port: 465
  username: ai@relay.neospace-grp.de
  password: "gn^gU613cqhG3rxFu"
